version: '3.8'

services:
  itvlist-checker:
    # 从Docker Hub拉取镜像
    # image: ${DOCKERHUB_USERNAME:-username}/itvlist:latest
    # 或者本地构建
    build: .
    container_name: itvlist-checker
    volumes:
      # 挂载本地目录到容器，用于保存生成的m3u文件
      - ./output:/app/output
    environment:
      # 可选的环境变量
      - TZ=Asia/Shanghai
    # 运行检测脚本
    command: python m3ucheck.py
    # 检测完成后容器退出
    restart: "no"

volumes:
  output:
    driver: local